name: shellcheck

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ubuntu-latest ships shellcheck; respects the repo .shellcheckrc
      # (strict: enable=all, external-sources, source-path=SCRIPTDIR).
      - name: shellcheck version
        run: shellcheck --version

      - name: Run shellcheck on all shell scripts
        run: |
          find bootstrap scripts user-data -name '*.sh' -print0 \
            | xargs -0 -r shellcheck
