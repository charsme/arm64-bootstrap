# File handles
fs.file-max = 2097152

# Inotify
fs.inotify.max_user_instances = 1024
fs.inotify.max_user_watches = 1048576

# Networking
net.core.somaxconn = 65535
net.core.netdev_max_backlog = 16384

# TCP
net.ipv4.tcp_fin_timeout = 15
net.ipv4.tcp_keepalive_time = 300
net.ipv4.tcp_tw_reuse = 1
net.ipv4.tcp_syncookies = 1
net.ipv4.tcp_max_syn_backlog = 8192

# TCP socket buffers (per-socket caps; kernel autotunes within range).
# Raised from kernel defaults to allow higher BDP single-stream throughput
# (cross-AZ/region S3, large image layer pulls). Memory cost is per-flow,
# not per-host: idle sockets stay near tcp_*mem middle value.
net.core.rmem_max = 16777216
net.core.wmem_max = 16777216
net.ipv4.tcp_rmem = 4096 131072 16777216
net.ipv4.tcp_wmem = 4096 65536 16777216

# BBR
net.core.default_qdisc = fq
net.ipv4.tcp_congestion_control = bbr

# Containers
net.ipv4.ip_forward = 1
net.bridge.bridge-nf-call-iptables = 1
net.bridge.bridge-nf-call-ip6tables = 1

# VM
vm.swappiness = 10
vm.vfs_cache_pressure = 50
# dirty_bytes / dirty_background_bytes are computed from MemTotal at bootstrap
# time and written to /etc/sysctl.d/51-bootstrap-memory.conf by stage 05.
# Absolute-byte form scales correctly across instance sizes; ratio form would
# produce huge flush bursts on large-RAM hosts (e.g. 15% of 64G = 9.6G).
