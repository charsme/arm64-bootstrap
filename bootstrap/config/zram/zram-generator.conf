[zram0]
# Size derived from RAM by systemd-zram-generator at boot/reload.
# Formula: half of MemTotal, capped at 8 GiB.
# Sizing table: 2Gâ†’1G, 4Gâ†’2G, 8Gâ†’4G, 16Gâ†’8G(cap), 32Gâ†’8G(cap), 64Gâ†’8G(cap).
# Cap exists to bound zstd compress CPU cost on small-core hosts (e.g. 2 vCPU r8g/m7g).
zram-size = min(ram / 2, 8192)
compression-algorithm = zstd
swap-priority = 100
fs-type = swap
